<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projectile Trajectory Simulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        h1 { margin-bottom: 20px; text-align: center; color: #00d9ff; text-shadow: 0 0 10px rgba(0, 217, 255, 0.5); }
        .container { display: flex; gap: 30px; max-width: 1400px; width: 100%; flex-wrap: wrap; justify-content: center; }
        .canvas-container { background: rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 20px; backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
        canvas { border: 2px solid #00d9ff; border-radius: 10px; background: #0a0a1a; }
        .controls { background: rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 25px; backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); min-width: 300px; }
        .control-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #00d9ff; }
        input[type="range"] { width: 100%; height: 8px; border-radius: 4px; background: rgba(255, 255, 255, 0.2); outline: none; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #00d9ff; cursor: pointer; box-shadow: 0 0 10px rgba(0, 217, 255, 0.5); }
        .value-display { text-align: right; font-size: 14px; color: #aaa; margin-top: 5px; }
        .stats { background: rgba(0, 0, 0, 0.3); border-radius: 10px; padding: 15px; margin-top: 20px; }
        .stat-item { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .stat-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .stat-label { color: #aaa; }
        .stat-value { color: #00d9ff; font-weight: bold; }
        button { width: 100%; padding: 12px; margin-top: 15px; border: none; border-radius: 8px; background: linear-gradient(135deg, #00d9ff, #0099cc); color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0, 217, 255, 0.3); }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 217, 255, 0.5); }
        .info { margin-top: 30px; max-width: 600px; text-align: center; background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 10px; line-height: 1.6; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 2px solid #00d9ff; background: rgba(0, 0, 0, 0.3); color: #fff; font-size: 14px; outline: none; }
        select option { background: #1a1a2e; color: #fff; }
    </style>
</head>
<body>
    <h1>Projectile Trajectory Simulator</h1>
    <div class="container">
        <div class="canvas-container">
            <canvas id="trajectoryCanvas" width="800" height="600"></canvas>
        </div>
        <div class="controls">
            <div class="control-group">
                <label for="velocity">Velocity (m/s)</label>
                <input type="range" id="velocity" min="1" max="100" value="50" step="0.5">
                <div class="value-display" id="velocityValue">50 m/s</div>
            </div>
            <div class="control-group">
                <label for="angle">Angle (degrees)</label>
                <input type="range" id="angle" min="0" max="90" value="45" step="0.5">
                <div class="value-display" id="angleValue">45°</div>
            </div>
            <div class="control-group">
                <label for="gravity">Gravity (m/s²)</label>
                <input type="range" id="gravity" min="1" max="20" value="9.81" step="0.01">
                <div class="value-display" id="gravityValue">9.81 m/s²</div>
            </div>
            <div class="control-group">
                <label for="height">Launch Height (m)</label>
                <input type="range" id="height" min="0" max="50" value="0" step="0.5">
                <div class="value-display" id="heightValue">0 m</div>
            </div>
            <div class="control-group">
                <label for="ballColor">Ball Color</label>
                <select id="ballColor">
                    <option value="#00ff00">Green</option>
                    <option value="#ffff00">Yellow</option>
                    <option value="#000000">Black</option>
                    <option value="#0000ff">Blue</option>
                    <option value="#ff0000">Red</option>
                </select>
            </div>
            <button id="fireBtn">Fire!</button>
            <button id="clearBtn">Clear Trail</button>
            <div class="stats">
                <div class="stat-item"><span class="stat-label">Max Distance:</span><span class="stat-value" id="maxDistance">0 m</span></div>
                <div class="stat-item"><span class="stat-label">Max Height:</span><span class="stat-value" id="maxHeight">0 m</span></div>
                <div class="stat-item"><span class="stat-label">Flight Time:</span><span class="stat-value" id="flightTime">0 s</span></div>
                <div class="stat-item"><span class="stat-label">Current X:</span><span class="stat-value" id="currentX">0 m</span></div>
                <div class="stat-item"><span class="stat-label">Current Y:</span><span class="stat-value" id="currentY">0 m</span></div>
            </div>
        </div>
    </div>
    <div class="info">
        <p><strong>How to use:</strong> Adjust velocity, angle, gravity, and launch height. Click "Fire!" to launch a projectile.</p>
        <p>Uses the same physics equations as your Unity project!</p>
    </div>
    <script>
        const canvas = document.getElementById('trajectoryCanvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width, height = canvas.height;
        const scale = 8, originX = 50, originY = height - 50;
        let balls = [], trails = [], animationId = null, ballColor = '#00ff00';
        
        const velocitySlider = document.getElementById('velocity');
        const angleSlider = document.getElementById('angle');
        const gravitySlider = document.getElementById('gravity');
        const heightSlider = document.getElementById('height');
        const fireBtn = document.getElementById('fireBtn');
        const clearBtn = document.getElementById('clearBtn');
        const ballColorSelect = document.getElementById('ballColor');
        
        function updateDisplays() {
            document.getElementById('velocityValue').textContent = velocitySlider.value + ' m/s';
            document.getElementById('angleValue').textContent = angleSlider.value + '°';
            document.getElementById('gravityValue').textContent = parseFloat(gravitySlider.value).toFixed(2) + ' m/s²';
            document.getElementById('heightValue').textContent = heightSlider.value + ' m';
        }
        
        [velocitySlider, angleSlider, gravitySlider, heightSlider].forEach(s => s.addEventListener('input', updateDisplays));
        ballColorSelect.addEventListener('change', e => ballColor = e.target.value);
        
        function calculateTrajectoryPoints(velocity, angleDeg, gravity, launchHeight, resolution = 100) {
            const angleRad = angleDeg * Math.PI / 180;
            const vy = velocity * Math.sin(angleRad), vx = velocity * Math.cos(angleRad);
            const discriminant = vy * vy + 2 * gravity * launchHeight;
            const flightTime = (vy + Math.sqrt(discriminant)) / gravity;
            const maxDistance = vx * flightTime;
            const timeToMaxHeight = vy / gravity;
            const maxHeight = launchHeight + (vy * timeToMaxHeight) - (0.5 * gravity * timeToMaxHeight * timeToMaxHeight);
            const points = [];
            for (let i = 0; i <= resolution; i++) {
                const t = (i / resolution) * flightTime;
                points.push({ x: vx * t, y: launchHeight + (vy * t) - (0.5 * gravity * t * t) });
            }
            return { points, maxDistance, maxHeight, flightTime };
        }
        
        function drawGrid() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let x = 0; x < width; x += 10 * scale) { ctx.beginPath(); ctx.moveTo(originX + x, 0); ctx.lineTo(originX + x, height); ctx.stroke(); }
            for (let y = 0; y < height; y += 10 * scale) { ctx.beginPath(); ctx.moveTo(0, originY - y); ctx.lineTo(width, originY - y); ctx.stroke(); }
            ctx.strokeStyle = '#00d9ff'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(originX, 0); ctx.lineTo(originX, height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, originY); ctx.lineTo(width, originY); ctx.stroke();
        }
        
        function animate() {
            ctx.clearRect(0, 0, width, height);
            drawGrid();
            trails.forEach(trail => {
                ctx.strokeStyle = 'rgba(0, 217, 255, 0.5)'; ctx.lineWidth = 2; ctx.setLineDash([5, 5]); ctx.beginPath();
                trail.data.points.forEach((p, i) => { i === 0 ? ctx.moveTo(originX + p.x * scale, originY - p.y * scale) : ctx.lineTo(originX + p.x * scale, originY - p.y * scale); });
                ctx.stroke(); ctx.setLineDash([]);
                if (trail.points.length >= 2) {
                    ctx.strokeStyle = trail.color; ctx.lineWidth = 2; ctx.globalAlpha = 0.6; ctx.beginPath();
                    trail.points.forEach((p, i) => { i === 0 ? ctx.moveTo(originX + p.x * scale, originY - p.y * scale) : ctx.lineTo(originX + p.x * scale, originY - p.y * scale); });
                    ctx.stroke(); ctx.globalAlpha = 1.0;
                }
            });
            balls.forEach((ball, idx) => {
                ball.time += ball.dt;
                ball.x = ball.vx * ball.time;
                ball.y = ball.launchHeight + (ball.vy * ball.time) - (0.5 * ball.gravity * ball.time * ball.time);
                ball.vy -= ball.gravity * ball.dt;
                if (ball.y <= 0) { ball.y = 0; ball.active = false; }
                if (ball.active && ball.time % 0.05 < ball.dt) ball.trail.push({ x: ball.x, y: ball.y });
                ctx.fillStyle = ball.color; ctx.beginPath(); ctx.arc(originX + ball.x * scale, originY - ball.y * scale, 8, 0, Math.PI * 2); ctx.fill();
                if (ball.active && idx === 0) {
                    document.getElementById('currentX').textContent = ball.x.toFixed(2) + ' m';
                    document.getElementById('currentY').textContent = ball.y.toFixed(2) + ' m';
                }
            });
            balls = balls.filter(b => b.active || b.time < 0.1);
            animationId = requestAnimationFrame(animate);
        }
        
        fireBtn.addEventListener('click', () => {
            const velocity = parseFloat(velocitySlider.value), angleDeg = parseFloat(angleSlider.value);
            const gravity = parseFloat(gravitySlider.value), launchHeight = parseFloat(heightSlider.value);
            const trajData = calculateTrajectoryPoints(velocity, angleDeg, gravity, launchHeight);
            document.getElementById('maxDistance').textContent = trajData.maxDistance.toFixed(2) + ' m';
            document.getElementById('maxHeight').textContent = trajData.maxHeight.toFixed(2) + ' m';
            document.getElementById('flightTime').textContent = trajData.flightTime.toFixed(2) + ' s';
            const angleRad = angleDeg * Math.PI / 180;
            balls.push({ x: 0, y: launchHeight, vx: velocity * Math.cos(angleRad), vy: velocity * Math.sin(angleRad), gravity, launchHeight, time: 0, dt: 0.016, active: true, color: ballColor, trail: [] });
            trails.push({ data: trajData, color: ballColor, points: [] });
            if (!animationId) animate();
        });
        
        clearBtn.addEventListener('click', () => {
            balls = []; trails = [];
            ctx.clearRect(0, 0, width, height);
            ['maxDistance', 'maxHeight', 'flightTime', 'currentX', 'currentY'].forEach(id => document.getElementById(id).textContent = id.includes('Time') ? '0 s' : '0 m');
        });
        
        updateDisplays();
        drawGrid();
        animate();
    </script>
</body>
</html>
